<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Application – NHFC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] },
          colors: { surface: '#0f172a', surfaceLight: '#1e293b', accent: '#fbbf24', blood: '#7f1d1d' }
        }
      }
    };
  </script>
  <style>body { font-family: 'Outfit', system-ui, sans-serif; }</style>
</head>
<body class="bg-surface text-slate-100 min-h-screen antialiased">
  <header class="border-b border-blood/50 bg-surfaceLight/30">
    <div class="max-w-3xl mx-auto px-4 py-6 flex items-center justify-between">
      <a href="index.html" class="text-slate-400 hover:text-accent transition-colors">← Event</a>
      <span class="text-accent font-semibold">NHFC</span>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-2xl font-bold text-slate-200 mb-2">Volunteer & Staff Application</h1>
    <p class="text-slate-500 text-sm mb-8">Apply to help grow NHFC as event staff, moderator, commentator, content creator, or community manager.</p>

    <form id="volunteer-form" action="#" method="post" class="space-y-6">
      <div>
        <label for="name" class="block text-sm font-medium text-slate-300 mb-1">Name or handle *</label>
        <input type="text" id="name" name="name" required class="w-full px-4 py-2 rounded-lg bg-surfaceLight border border-slate-600 text-slate-100 focus:border-accent focus:ring-1 focus:ring-accent">
      </div>
      <div>
        <label for="role" class="block text-sm font-medium text-slate-300 mb-1">Role you're interested in *</label>
        <select id="role" name="role" required class="w-full px-4 py-2 rounded-lg bg-surfaceLight border border-slate-600 text-slate-100 focus:border-accent focus:ring-1 focus:ring-accent">
          <option value="">Select role</option>
          <option value="Event staff">Event staff</option>
          <option value="Moderator">Moderator</option>
          <option value="Commentator">Commentator</option>
          <option value="Media/Content creator">Media/Content creator</option>
          <option value="Community manager">Community manager</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <label for="discord_username" class="block text-sm font-medium text-slate-300 mb-1">Discord username *</label>
        <input type="text" id="discord_username" name="discord_username" required class="w-full px-4 py-2 rounded-lg bg-surfaceLight border border-slate-600 text-slate-100 focus:border-accent focus:ring-1 focus:ring-accent">
      </div>
      <div>
        <label for="experience" class="block text-sm font-medium text-slate-300 mb-1">Relevant experience or why you'd like to help</label>
        <textarea id="experience" name="experience" rows="4" class="w-full px-4 py-2 rounded-lg bg-surfaceLight border border-slate-600 text-slate-100 focus:border-accent focus:ring-1 focus:ring-accent" placeholder="Tell us about your experience or motivation"></textarea>
      </div>
      <div>
        <label for="contact" class="block text-sm font-medium text-slate-300 mb-1">Contact (email or other)</label>
        <input type="text" id="contact" name="contact" class="w-full px-4 py-2 rounded-lg bg-surfaceLight border border-slate-600 text-slate-100 focus:border-accent focus:ring-1 focus:ring-accent">
      </div>
      <button type="submit" class="w-full py-3 rounded-lg bg-blood hover:bg-blood/90 text-white font-semibold border border-accent/50 transition-colors">Submit Application</button>
    </form>

    <p class="mt-6 text-slate-500 text-xs">Form endpoint not configured. Site owner: set the form <code class="text-slate-400">action</code> to your Formspree or backend URL to receive submissions.</p>
  </main>
</body>
</html>
